<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SŌF MOJITO TV</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:Arial;-webkit-tap-highlight-color:transparent}
#video{width:100%;height:100%;position:fixed;top:0;left:0;display:none;background:#000}
#menu{padding:50px 10px 0 10px;height:100%;display:flex;flex-direction:column;align-items:center}
.logo{font-size:72px;font-weight:bold;text-align:center;line-height:1}
.logo .sof{color:#8b0000;text-shadow:0 0 10px #ff0000,0 0 20px #8b0000}
.logo .mojito{color:#dc143c;text-shadow:0 0 10px #ff0000,0 0 20px #dc143c}
.logo .tv{color:#ff0000;font-size:32px;vertical-align:top;margin-left:5px;text-shadow:0 0 10px #ff0000}
#in{font-size:32px;padding:20px;background:transparent;border:none;color:#666;text-align:center;margin-bottom:20px;outline:none;text-shadow:0 0 5px rgba(255,0,0,0.3)}
#in.focused{color:#aaa;text-shadow:0 0 10px rgba(255,0,0,0.5)}
#searchInput{display:none;width:90%;max-width:500px;font-size:18px;padding:12px 16px;background:#1a1a1a;color:#fff;border:1px solid #555;border-radius:8px;margin:10px auto;outline:none}
#searchInput:focus{border-color:#ff0000}
#searchInput.visible{display:block}
#goBtn{display:none;margin:8px auto;padding:12px 30px;background:#8b0000;border:none;color:#fff;font-size:18px;cursor:pointer;border-radius:6px}
#goBtn.visible{display:block}
#msg{font-size:20px;padding:15px;color:#8b0000;min-height:30px;text-align:center}
.error{color:#ff0000}
.info{color:#dc143c}
.hidden{display:none}
#qm{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:200;flex-direction:column;justify-content:center;align-items:center}
#qm.show{display:flex}
#qm h2{color:#ff0000;font-size:48px;margin-bottom:40px;text-shadow:0 0 20px #ff0000,0 0 40px #8b0000}
#qm p{color:#8b0000;font-size:24px;padding:15px}
select{font-size:20px;width:100%;max-width:600px;padding:15px;background:#1a1a1a;color:#fff;border:1px solid #333;border-radius:8px;margin-top:10px;height:300px}
option{background:#1a1a1a;color:#aaa;padding:12px;min-height:40px}
option:checked,option:focus,option:selected{background:#0066cc;color:#fff}
#resultsList{width:100%;max-width:600px;margin-top:10px;display:none}
.stream-item{padding:14px 16px;border-bottom:1px solid #222;font-size:16px;color:#aaa;cursor:pointer;-webkit-user-select:none;user-select:none}
.stream-item:active{background:#1a1a1a;color:#fff}
.stream-item.active{background:#8b0000;color:#fff}
</style>
</head>
<body>

<video id="video" playsinline webkit-playsinline controls></video>

<div id="qm">
<h2>SŌF CONTROL</h2>
<p>▶ ENTER: siguiente</p>
<p>◀ FLECHA ARRIBA: anterior</p>
<p>⏯ ESPACIO: play/pause</p>
<p>❌ ESC: cerrar</p>
</div>

<div id="menu">
<div class="logo"><span class="sof">SōF</span><span class="mojito"> MoJiTo</span><span class="tv"> TV</span></div>
<div id="in">Escribe el canal...</div>
<input type="text" id="searchInput" placeholder="Buscar canal..." autocomplete="off" autocapitalize="none">
<button id="goBtn">BUSCAR</button>
<button id="more" style="display:none;margin-top:10px;padding:10px 20px;background:#8b0000;border:none;color:#fff;cursor:pointer;border-radius:6px;">MAS STREAMS (+20)</button>
<div id="msg" class="info">↑↓ navegar | ENTER reproducir</div>
<select id="results" size="10" class="hidden"></select>
<div id="resultsList"></div>
</div>

<script>
var BASE=window.location.protocol+'//'+window.location.host;
var API=BASE+'/api/search';
var streams=[], favorites=[], idx=0, txt='', mode='search', page=1, hasMore=false, loading=false;
var elIn=document.getElementById('in'), elSel=document.getElementById('results'), elMsg=document.getElementById('msg'), elMenu=document.getElementById('menu'), elVideo=document.getElementById('video'), elSearchInput=document.getElementById('searchInput'), elGoBtn=document.getElementById('goBtn'), elResultsList=document.getElementById('resultsList');

function log(m,t){elMsg.textContent=m;elMsg.className=t||'info'}

function ql(t){
    if(/1080|4k|uhd/i.test(t))return' [1080p]';
    if(/720|hd/i.test(t))return' [HD]';
    if(/480|sd/i.test(t))return' [SD]';
    return'';
}

function renderIn(){elIn.textContent=txt||'Escribe el canal...';}

function setMode(m){
    mode=m;
    elIn.classList.toggle('focused',m==='search');
    elSel.classList.toggle('hidden',m==='search');
}

function addFavorite(){
    var s=streams[idx];
    if(!s||favorites.some(function(f){return f.url===s.url}))return;
    favorites.push({title:s.title,url:s.url});
    log('★ Guardado: '+s.title.substring(0,20));
}

function showFavorites(){
    mode='favorites';
    elSel.innerHTML='';elSel.classList.remove('hidden');
    elResultsList.style.display='none';
    if(!favorites.length){log('Sin favoritos');return;}
    favorites.forEach(function(f,i){
        elSel.add(new Option('★ '+f.title.substring(0,60),i));
    });
    idx=0;elSel.selectedIndex=0;
    log(favorites.length+' favoritos');
}

function playStream(startIdx){
    var trial=0, max=5, s;
    function tryNext(){
        if(trial>=max||!(s=streams[startIdx+trial])){
            log('Sin stream válido');
            elVideo.style.display='none';
            elMenu.style.display='flex';
            return;
        }
        log('Probando '+(trial+1)+': '+s.title.substring(0,25));
        elVideo.dataset.idx=startIdx+trial;
        elVideo.src=s.url;
        elVideo.play().then(function(){log('✓ '+s.title.substring(0,30));}).catch(function(){trial++;setTimeout(tryNext,800);});
    }
    elVideo.style.display='block';
    elMenu.style.display='none';
    elVideo.onerror=function(){trial++;setTimeout(tryNext,500);};
    tryNext();
}

function playFav(favIdx){
    var f=favorites[favIdx];
    if(!f)return;
    elVideo.dataset.idx=favIdx;
    elVideo.src=f.url;
    elVideo.style.display='block';
    elMenu.style.display='none';
    elVideo.onerror=function(){
        var n=parseInt(elVideo.dataset.idx)+1;
        if(n<favorites.length){log('Error, siguiente...');setTimeout(function(){playFav(n)},1500);}else{log('Sin opciones');}
    };
    elVideo.play().catch(function(){log('Toca para reproducir');});
}

function buscar(){
    if(!txt.trim())return;
    log('Buscando...');
    elSel.innerHTML='';elSel.classList.add('hidden');elResultsList.style.display='none';
    streams=[];page=1;
    loadPage(1);
}

function loadPage(p){
    if(loading)return;
    loading=true;
    log('Cargando...');
    var x=new XMLHttpRequest();
    x.open('GET',API+'?q='+encodeURIComponent(txt)+'&page='+p,true);
    x.onload=function(){
        loading=false;
        if(x.status===200){
            try{
                var d=JSON.parse(x.responseText);
                showStreams(d.streams||[],d.hasMore,p===1);
            }catch(e){log('Error');}
        }
    };
    x.onerror=function(){loading=false;log('Sin conexion');};
    x.send();
}

function showStreams(data,more,isFirst){
    if(!data||!data.length){log('Sin resultados');return;}
    hasMore=more;
    data.sort(function(a,b){
        var ga=/1080|4k|uhd/i.test(a.title)?3:(/720|hd/i.test(a.title)?2:1);
        var gb=/1080|4k|uhd/i.test(b.title)?3:(/720|hd/i.test(b.title)?2:1);
        return gb-ga;
    });
    if(isFirst){streams=data;idx=-1;elSel.innerHTML='';elResultsList.innerHTML='';}
    var base=isFirst?0:streams.length;
    data.forEach(function(s,i){
        var pos=base+i;
        streams.push(s);
        if(!isFirst){
            elSel.add(new Option((pos+1)+'. '+s.title.substring(0,50)+ql(s.title),pos));
        }
        var div=document.createElement('div');
        div.className='stream-item';
        div.textContent=(pos+1)+'. '+s.title.substring(0,55)+ql(s.title);
        div.dataset.idx=pos;
        div.addEventListener('click',function(){
            idx=pos;
            playStream(pos);
        });
        div.addEventListener('touchend',function(e){
            e.preventDefault();
            idx=pos;
            playStream(pos);
        });
        elResultsList.appendChild(div);
    });
    elResultsList.style.display='block';
    elSel.classList.add('hidden');
    log(streams.length+' streams'+(hasMore?' - MAS':' - FIN'));
}

// KEYBOARD CONTROL (remote) - untouched
document.addEventListener('keydown',function(e){
    var k=e.key;
    if(elVideo.style.display==='block'){
        if(k==='Escape'){elVideo.pause();elVideo.style.display='none';elMenu.style.display='flex';log('Cerrado');}
        else if(k===' '){e.preventDefault();elVideo.paused?elVideo.play():elVideo.pause();}
        else if(k==='ArrowRight'){e.preventDefault();var n=parseInt(elVideo.dataset.idx)+1;n<streams.length?playStream(n):log('Fin lista');}
        else if(k==='ArrowLeft'){e.preventDefault();var p=parseInt(elVideo.dataset.idx)-1;p>=0?playStream(p):log('Inicio lista');}
        return;
    }
    if(k==='ArrowDown'){
        e.preventDefault();
        var lim=mode==='search'&&txt.length>0?streams.length-1:favorites.length-1;
        if(idx<lim){idx++;elSel.value=idx;elSel.selectedIndex=idx;elSel.focus();log((mode==='search'?streams[idx]:favorites[idx]).title.substring(0,40));}
        else if(mode==='search'&&txt.length>0&&hasMore){page++;loadPage(page);log('Cargando más...');}
    }else if(k==='ArrowUp'){
        e.preventDefault();
        if(idx>0){idx--;elSel.value=idx;elSel.selectedIndex=idx;elSel.focus();log((mode==='search'?streams[idx]:favorites[idx]).title.substring(0,40));}
    }else if(k==='Enter'){
        e.preventDefault();
        if(mode==='favorites'&&favorites[idx])playFav(idx);
        else if(mode==='search'&&txt.length>0&&idx>=0&&streams[idx])playStream(idx);
        else if(mode==='search'){setMode('search');buscar();}
    }else if(k==='Backspace'){txt=txt.slice(0,-1);renderIn();idx=-1;elSel.innerHTML='';}
    else if(k.length===1){txt+=k;renderIn();}
    else if(k==='F1'){e.preventDefault();document.getElementById('qm').classList.toggle('show');}
    else if(k==='f'||k==='F'){if(mode==='search'&&streams[idx])addFavorite();}
    else if(k==='s'||k==='S'){showFavorites();}
    else if(k==='Home'){txt='';renderIn();setMode('search');elSel.innerHTML='';idx=-1;}
    else if(k==='PageDown'){if(hasMore){page++;loadPage(page);}}
    else if(k==='PageUp'){if(page>1){page--;loadPage(page);}}
});

// TOUCH: video tap = play/pause, double tap = back
var videoTapTime=0;
elVideo.addEventListener('touchend',function(e){
    var now=Date.now();
    if(now-videoTapTime<300){
        elVideo.pause();
        elVideo.style.display='none';
        elMenu.style.display='flex';
    }else{
        if(elVideo.paused)elVideo.play().catch(function(){});
        else elVideo.pause();
    }
    videoTapTime=now;
});

// TOUCH: search input for mobile
elGoBtn.addEventListener('click',function(){
    txt=elSearchInput.value;
    renderIn();
    buscar();
});

elSearchInput.addEventListener('keydown',function(e){
    if(e.key==='Enter'){
        txt=elSearchInput.value;
renderIn();

if('ontouchstart' in window||navigator.maxTouchPoints){
    elSearchInput.classList.add('visible');
    elGoBtn.classList.add('visible');
}
        buscar();
    }
});

// Select click for select-based navigation (fallback)
elSel.addEventListener('change',function(){
    idx=parseInt(elSel.value);
    if(mode==='favorites'&&favorites[idx])playFav(idx);
    else if(mode==='search'&&streams[idx])playStream(idx);
});

// Swipe on resultsList for load more
var listStartY=0;
elResultsList.addEventListener('touchstart',function(e){
    listStartY=e.touches[0].clientY;
});

elResultsList.addEventListener('touchend',function(e){
    var dy=e.changedTouches[0].clientY-listStartY;
    if(dy<-80&&hasMore&&mode==='search'){
        page++;loadPage(page);log('Cargando mas...');
    }
});

renderIn();
</script>
</body>
</html>
