<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SŌF MOJITO TV</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:Arial;overflow:hidden}
#bg1,#bg2{position:fixed;top:0;left:0;width:100%;height:100%;background-size:cover;background-position:center;background-repeat:no-repeat;transition:opacity 2s ease-in-out;z-index:0}
#bg1{opacity:1}
#bg2{opacity:0}
#video{width:100%;height:100%;position:fixed;top:0;left:0;display:none;background:#000;z-index:1}
#menu{padding:50px 10px 0 10px;height:100%;display:flex;flex-direction:column;align-items:center;position:relative;z-index:2}
.logo{font-size:72px;font-weight:bold;text-align:center;line-height:1}
.logo .sof{color:#8b0000;text-shadow:0 0 10px #ff0000,0 0 20px #8b0000}
.logo .mojito{color:#dc143c;text-shadow:0 0 10px #ff0000,0 0 20px #dc143c}
.logo .tv{color:#ff0000;font-size:32px;vertical-align:top;margin-left:5px;text-shadow:0 0 10px #ff0000}
#in{font-size:32px;padding:20px;background:transparent;border:none;color:#666;text-align:center;margin-bottom:20px;outline:none;text-shadow:0 0 5px rgba(255,0,0,0.3)}
#in.focused{color:#aaa;text-shadow:0 0 10px rgba(255,0,0,0.5)}
#msg{font-size:20px;padding:15px;color:#8b0000;min-height:30px}
.error{color:#ff0000}
.info{color:#dc143c}
.hidden{display:none}
#qm{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:200;flex-direction:column;justify-content:center;align-items:center}
#qm.show{display:flex}
#qm h2{color:#ff0000;font-size:48px;margin-bottom:40px;text-shadow:0 0 20px #ff0000,0 0 40px #8b0000}
#qm p{color:#8b0000;font-size:24px;padding:15px}
select{font-size:20px;width:100%;padding:15px;background:#1a1a1a;color:#fff;border:1px solid #333;border-radius:8px;margin-top:20px;height:300px}
option{background:#1a1a1a;color:#aaa;padding:12px}
option:checked,option:focus,option:selected{background:#0066cc;color:#fff}
#mobileInput{display:none;width:85%;max-width:400px;font-size:18px;padding:12px 16px;background:#1a1a1a;color:#fff;border:1px solid #555;border-radius:8px;margin:10px 0;outline:none;-webkit-user-select:auto;user-select:auto}
#mobileInput:focus{border-color:#ff0000}
#mobileInput.show{display:block}
</style>
</head>
<body>

<div id="bg1"></div>
<div id="bg2"></div>

<video id="video" playsinline webkit-playsinline controls></video>

<div id="qm">
<h2>SŌF CONTROL</h2>
<p>▶ ENTER: siguiente</p>
<p>◀ FLECHA ARRIBA: anterior</p>
<p>⏯ ESPACIO: play/pause</p>
<p>❌ ESC: cerrar</p>
</div>

<div id="menu">
<div class="logo"><span class="sof">SōF</span><span class="mojito"> MoJiTo</span><span class="tv"> TV</span></div>
<div id="in">Escribe el canal...</div>
<input type="search" id="mobileInput" placeholder="Buscar canal..." autocomplete="off" autocapitalize="none">
<button id="more" style="display:none;margin-top:10px;padding:10px 20px;background:#8b0000;border:none;color:#fff;cursor:pointer;">MAS STREAMS (+20)</button>
<div id="msg" class="info">↑↓ navegar | ENTER reproducir</div>
<select id="results" size="10" class="hidden"></select>
</div>

<script>
var BASE=window.location.protocol+'//'+window.location.host;
var API=BASE+'/api/search';
var streams=[], favorites=[], idx=0, txt='', mode='search', page=1, hasMore=false, loading=false;
var elIn=document.getElementById('in'), elSel=document.getElementById('results'), elMsg=document.getElementById('msg'), elMenu=document.getElementById('menu'), elVideo=document.getElementById('video'), elMobileInput=document.getElementById('mobileInput'), elMore=document.getElementById('more');

function log(m,t){elMsg.textContent=m;elMsg.className=t||'info'}

function ql(t){
    if(/1080|4k|uhd/i.test(t))return' [1080p]';
    if(/720|hd/i.test(t))return' [HD]';
    if(/480|sd/i.test(t))return' [SD]';
    return'';
}

function renderIn(){elIn.textContent=txt||'Escribe el canal...';}

function setMode(m){
    mode=m;
    elIn.classList.toggle('focused',m==='search');
    elSel.classList.toggle('hidden',m==='search');
}

function addFavorite(){
    var s=streams[idx];
    if(!s||favorites.some(function(f){return f.url===s.url}))return;
    favorites.push({title:s.title,url:s.url});
    log('★ Guardado: '+s.title.substring(0,20));
}

function showFavorites(){
    mode='favorites';
    elSel.innerHTML='';elSel.classList.remove('hidden');
    elMore.style.display='none';
    if(!favorites.length){log('Sin favoritos');return;}
    favorites.forEach(function(f,i){
        elSel.add(new Option('★ '+f.title.substring(0,60),i));
    });
    idx=0;elSel.selectedIndex=0;
    log(favorites.length+' favoritos');
}

function playStream(startIdx){
    var trial=0, maxTries=5, s, locked=false;
    function tryNext(){
        if(locked)return;
        locked=true;
        if(trial>=maxTries||!(s=streams[startIdx+trial])){
            log('Sin stream válido');
            elVideo.style.display='none';
            elMenu.style.display='flex';
            locked=false;
            return;
        }
        log('Probando '+(trial+1)+': '+s.title.substring(0,25));
        elVideo.dataset.idx=startIdx+trial;
        elVideo.src=s.url;
        elVideo.onplaying=function(){
            elVideo.onplaying=null;
            locked=false;
            log('✓ '+s.title.substring(0,30));
        };
        elVideo.onerror=function(){
            elVideo.onerror=null;
            if(locked){locked=false;trial++;setTimeout(tryNext,500);}
        };
        elVideo.play().then(function(){
            locked=false;
            log('✓ '+s.title.substring(0,30));
        }).catch(function(){
            if(locked){locked=false;trial++;setTimeout(tryNext,800);}
        });
    }
    elVideo.style.display='block';
    elMenu.style.display='none';
    trial=0;
    tryNext();
}

function playFav(favIdx){
    var f=favorites[favIdx];
    if(!f)return;
    elVideo.dataset.idx=favIdx;
    elVideo.src=f.url;
    elVideo.style.display='block';
    elMenu.style.display='none';
    elVideo.onerror=function(){
        var n=parseInt(elVideo.dataset.idx)+1;
        if(n<favorites.length){log('Error, siguiente...');setTimeout(function(){playFav(n)},1500);}else{log('Sin opciones');}
    };
    elVideo.play().catch(function(){log('Toca para reproducir');});
}

function resetSearchState(){
    streams=[];page=1;hasMore=false;idx=-1;
    elSel.innerHTML='';elSel.classList.add('hidden');
    elMore.style.display='none';
}

function buscar(){
    if(!txt.trim())return;
    log('Buscando...');
    resetSearchState();
    loadPage(1);
}

function loadPage(p){
    if(loading)return;
    loading=true;
    log('Cargando...');
    var x=new XMLHttpRequest();
    x.open('GET',API+'?q='+encodeURIComponent(txt)+'&page='+p,true);
    x.timeout=20000;
    x.onload=function(){
        loading=false;
        if(x.status===200){
            try{
                var d=JSON.parse(x.responseText);
                showStreams(d.streams||[],!!d.hasMore,p===1);
                if(p>1&&d.streams&&d.streams.length){idx=streams.length-d.streams.length;elSel.selectedIndex=idx;elSel.focus();}
            }catch(e){log('Error al parsear');hasMore=false;}
        }else{loading=false;log('Error del servidor');hasMore=false;}
    };
    x.onerror=function(){loading=false;log('Sin conexion');hasMore=false;};
    x.ontimeout=function(){loading=false;log('Timeout');hasMore=false;};
    x.send();
}

function showStreams(data,more,isFirst){
    if(!data||!data.length){log('Sin resultados');hasMore=more;return;}
    hasMore=more;
    if(isFirst){streams=data;idx=-1;elSel.innerHTML='';elSel.classList.remove('hidden');}
    data.forEach(function(s,i){
        var pos=isFirst?i:streams.length;
        elSel.add(new Option((pos+1)+'. '+s.title.substring(0,50)+ql(s.title),pos));
        streams.push(s);
    });
    if(hasMore){elMore.style.display='block';}
    log(streams.length+' streams'+(hasMore?' - MAS':' - FIN'));
}

document.addEventListener('keydown',function(e){
    var k=e.key;
    if(elVideo.style.display==='block'){
        if(k==='Escape'){elVideo.pause();elVideo.style.display='none';elMenu.style.display='flex';log('Cerrado');}
        else if(k===' '){e.preventDefault();elVideo.paused?elVideo.play():elVideo.pause();}
        else if(k==='ArrowRight'){e.preventDefault();var n=parseInt(elVideo.dataset.idx)+1;n<streams.length?playStream(n):log('Fin lista');}
        else if(k==='ArrowLeft'){e.preventDefault();var p=parseInt(elVideo.dataset.idx)-1;p>=0?playStream(p):log('Inicio lista');}
        return;
    }
    if(k==='ArrowDown'){
        e.preventDefault();
        var lim=mode==='search'&&txt.length>0?streams.length-1:favorites.length-1;
        if(idx<lim){idx++;elSel.value=idx;elSel.selectedIndex=idx;elSel.focus();log((mode==='search'?streams[idx]:favorites[idx]).title.substring(0,40));}
        else if(mode==='search'&&txt.length>0&&hasMore){page++;loadPage(page);log('Cargando más...');}
    }else if(k==='ArrowUp'){
        e.preventDefault();
        if(idx>0){idx--;elSel.value=idx;elSel.selectedIndex=idx;elSel.focus();log((mode==='search'?streams[idx]:favorites[idx]).title.substring(0,40));}
    }else if(k==='Enter'){
        e.preventDefault();
        if(mode==='favorites'&&favorites[idx])playFav(idx);
        else if(mode==='search'&&txt.length>0&&idx>=0&&streams[idx])playStream(idx);
        else if(mode==='search'){setMode('search');buscar();}
    }else if(k==='Backspace'){txt=txt.slice(0,-1);renderIn();idx=-1;elSel.innerHTML='';}
    else if(k.length===1){txt+=k;renderIn();}
    else if(k==='F1'){e.preventDefault();document.getElementById('qm').classList.toggle('show');}
    else if(k==='f'||k==='F'){if(mode==='search'&&streams[idx])addFavorite();}
    else if(k==='s'||k==='S'){showFavorites();}
    else if(k==='Home'){txt='';renderIn();setMode('search');elSel.innerHTML='';idx=-1;hasMore=false;elMore.style.display='none';}
    else if(k==='PageDown'){if(hasMore){page++;loadPage(page);}}
    else if(k==='PageUp'){if(page>1){page--;loadPage(page);}}
});

elMore.addEventListener('click',function(){
    if(hasMore&&!loading){page++;loadPage(page);elMore.style.display='none';}
});

if('ontouchstart' in window||navigator.maxTouchPoints){
    elMobileInput.classList.add('show');
    elMobileInput.addEventListener('input',function(){
        txt=elMobileInput.value.toLowerCase();
renderIn();

var bgs=[
'https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUyZ3JjbTJnZjZuOWNiOWV5eGF2cjNjcW5oc28zeHBwaXB1d2RsM25uaSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/UyYcK4GZKyBHA44JXW/giphy.gif',
'https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUydmhldXRzNndrcnZsZGVidHlsNmtobXhpNXhqMGl0bWhyZ2FwaW93ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/45aI8f1nI1b071X96C/giphy.gif',
'https://media3.giphy.com/media/v1.Y2lkPTZjMDliOTUycmx2bTBtOWdybGoybWJ3Nmw3ZTRqZjV6azJhM3Fkb25xMHY2ZDV5byZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/1U9pq0QDGiEEmTzG3D/giphy.gif',
'https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUyMjR2djg3YWtyY3dvaGR2bWp5bHVhbDlyaWwzbWV6eWswczZwYW9xbiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/l3vRjILNceM6FEPHW/giphy.gif'
];
var elBg1=document.getElementById('bg1'),elBg2=document.getElementById('bg2'),activeBg='bg1',lastBg=-1;
function pickBg(){var n;do{n=Math.floor(Math.random()*bgs.length);}while(n===lastBg&&bgs.length>1);lastBg=n;return bgs[n];}
elBg1.style.backgroundImage='url('+pickBg()+')';
setInterval(function(){
var incoming=pickBg();
if(activeBg==='bg1'){elBg2.style.backgroundImage='url('+incoming+')';elBg2.style.opacity='1';elBg1.style.opacity='0';activeBg='bg2';}
else{elBg1.style.backgroundImage='url('+incoming+')';elBg1.style.opacity='1';elBg2.style.opacity='0';activeBg='bg1';}
},5000);
        idx=-1;elSel.innerHTML='';
    });
    elMobileInput.addEventListener('keydown',function(e){
        if(e.key==='Enter'){e.preventDefault();buscar();elMobileInput.blur();}
    });
    elSel.addEventListener('change',function(){
        var i=parseInt(elSel.value);
        idx=i;
        if(mode==='favorites'&&favorites[i])playFav(i);
        else if(mode==='search'&&streams[i])playStream(i);
    });
}

renderIn();
</script>
</body>
</html>
