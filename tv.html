<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SŌF MOJITO TV</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:Arial;overflow:hidden}
#bg{position:fixed;top:0;left:0;width:100%;height:100%;background-size:cover;background-position:center;z-index:0}
#menu{padding:50px 10px 0 10px;height:100%;display:flex;flex-direction:column;align-items:center;position:relative;z-index:2}
.logo{font-size:72px;font-weight:bold;text-align:center;line-height:1}
.logo .sof{color:#8b0000;text-shadow:0 0 10px #ff0000,0 0 20px #8b0000}
.logo .mojito{color:#dc143c;text-shadow:0 0 10px #ff0000,0 0 20px #dc143c}
.logo .tv{color:#ff0000;font-size:32px;vertical-align:top;margin-left:5px;text-shadow:0 0 10px #ff0000}
#in{font-size:32px;padding:20px;background:transparent;border:none;color:#666;text-align:center;margin-bottom:20px;outline:none;text-shadow:0 0 5px rgba(255,0,0,0.3)}
#in.focused{color:#aaa;text-shadow:0 0 10px rgba(255,0,0,0.5)}
#msg{font-size:20px;padding:15px;color:#8b0000;min-height:30px}
.error{color:#ff0000}
.info{color:#dc143c}
.hidden{display:none}
#qm{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:200;flex-direction:column;justify-content:center;align-items:center}
#qm.show{display:flex}
#qm h2{color:#ff0000;font-size:48px;margin-bottom:40px;text-shadow:0 0 20px #ff0000,0 0 40px #8b0000}
#qm p{color:#8b0000;font-size:24px;padding:15px}
select{font-size:20px;width:100%;padding:15px;background:#1a1a1a;color:#fff;border:1px solid #333;border-radius:8px;margin-top:20px;height:300px}
option{background:#1a1a1a;color:#aaa;padding:12px}
option:checked,option:focus,option:selected{background:#0066cc;color:#fff}
</style>
</head>
<body>
<div id="bg"></div>
<div id="qm">
<h2>SŌF CONTROL</h2>
<p>▶ ENTER: siguiente | ◀ ARRIBA: anterior</p>
<p>⏯ ESPACIO: play/pause | ❌ ESC: cerrar</p>
</div>
<div id="menu">
<div class="logo"><span class="sof">SōF</span><span class="mojito"> MoJiTo</span><span class="tv"> TV</span></div>
<div id="in">Escribe el canal...</div>
<button id="more" style="display:none;margin-top:10px;padding:10px 20px;background:#8b0000;border:none;color:#fff;cursor:pointer;">MAS STREAMS (+20)</button>
<div id="msg" class="info">↑↓ navegar | ENTER reproducir</div>
<select id="results" size="10" class="hidden"></select>
</div>
<script>
var BASE=window.location.protocol+'//'+window.location.host,
API=BASE+'/api/search',
streams=[],favorites=[],idx=0,txt='',mode='search',page=1,hasMore=false,loading=false,
playingFav=false,playingIdx=-1,
elIn=document.getElementById('in'),elSel=document.getElementById('results'),elMsg=document.getElementById('msg'),
elMenu=document.getElementById('menu'),elMore=document.getElementById('more'),elQm=document.getElementById('qm'),
videoEl=null,videoTimeout=null;

function getVideo(){
    if(!videoEl||!videoEl.parentNode){
        videoEl=document.createElement('video');
        videoEl.id='video';videoEl.setAttribute('controls','');
        videoEl.style.cssText='width:100%;height:100%;position:fixed;top:0;left:0;display:none;background:#000;z-index:1';
        document.body.insertBefore(videoEl,elMenu);
    }
    return videoEl;
}

function log(m,t){elMsg.textContent=m;elMsg.className=t||'info'}
function ql(t){return /1080|4k|uhd/i.test(t)?' [1080p]':/720|hd/i.test(t)?' [HD]':/480|sd/i.test(t)?' [SD]':''}
function renderIn(){elIn.textContent=txt||'Escribe el canal...'}
function setMode(m){mode=m;elIn.classList.toggle('focused',m==='search');elSel.classList.toggle('hidden',m==='search');elMore.style.display='none'}
function clearVideoTimeout(){if(videoTimeout){clearTimeout(videoTimeout);videoTimeout=null}}

function destroyVideo(){
    clearVideoTimeout();
    if(videoEl&&videoEl.parentNode){videoEl.pause();videoEl.src='';videoEl.removeAttribute('src');videoEl.remove();}
    videoEl=null;
}

function scrollToSel(){var s=elSel.selectedOptions[0];if(s)s.scrollIntoView({block:'nearest'})}
function sortStreams(){streams.sort(function(a,b){var ga=/1080|4k|uhd/i.test(a.title)?3:/720|hd/i.test(a.title)?2:1,gb=/1080|4k|uhd/i.test(b.title)?3:/720|hd/i.test(b.title)?2:1;return gb-ga})}

function closeVideo(){
    destroyVideo();
    elMenu.style.display='flex';
}

function addFavorite(){
    var s=mode==='search'?streams[idx]:null;
    if(!s||favorites.some(function(f){return f.url===s.url}))return;
    favorites.push({title:s.title,url:s.url});
    log('★ Guardado: '+s.title.substring(0,20));
}

function showFavorites(){
    setMode('favorites');elSel.innerHTML='';elSel.classList.remove('hidden');
    if(!favorites.length){log('Sin favoritos');return}
    favorites.forEach(function(f,i){elSel.add(new Option('★ '+f.title.substring(0,60),i))});
    idx=0;elSel.selectedIndex=0;log(favorites.length+' favoritos');
}

function startPlay(url,title,isFav,streamIdx){
    playingFav=isFav;playingIdx=streamIdx;
    destroyVideo();
    var v=getVideo();
    log('▶ '+title.substring(0,40));
    v.style.display='block';elMenu.style.display='none';
    v.src=url;
    v.onerror=function(){v.onerror=null;clearVideoTimeout();log('✗ Falló – elige otro','error');closeVideo()};
    v.onplaying=function(){v.onplaying=null;clearVideoTimeout();log('✓ '+title.substring(0,40))};
    v.play().catch(function(){});
    videoTimeout=setTimeout(function(){if(!v.parentNode||v.readyState<2){log('✗ Timeout – elige otro','error');closeVideo()}},20000);
}

function playStream(i){if(!streams[i])return;startPlay(streams[i].url,streams[i].title,false,i)}
function playFav(i){if(!favorites[i])return;startPlay(favorites[i].url,favorites[i].title,true,i)}

function resetResults(){elSel.innerHTML='';elSel.classList.add('hidden');streams=[];hasMore=false;elMore.style.display='none'}

function buscar(){if(!txt.trim())return;log('Buscando...');resetResults();page=1;loadPage(1)}

function loadPage(p){
    if(loading)return;loading=true;log('Cargando...');
    var x=new XMLHttpRequest();
    x.open('GET',API+'?q='+encodeURIComponent(txt)+'&page='+p,true);
    x.timeout=20000;
    x.onload=function(){
        loading=false;
        if(x.status===200){
            try{
                var d=JSON.parse(x.responseText);
                showStreams(d.streams||[],!!d.hasMore,p===1);
                if(p>1){idx=streams.length-(d.streams||[]).length;elSel.selectedIndex=idx;scrollToSel()}
            }catch(e){log('Error al parsear','error')}
        }else{log('Error del servidor','error')}
    };
    x.onerror=function(){loading=false;log('Sin conexion','error')};
    x.ontimeout=function(){loading=false;log('Timeout servidor','error')};
    x.send();
}

function showStreams(data,more,isFirst){
    if(!data||!data.length){if(isFirst)log('Sin resultados');return}
    hasMore=more;
    if(isFirst){streams=data;idx=-1;elSel.innerHTML='';elSel.classList.remove('hidden');sortStreams()}
    else{data.forEach(function(s){streams.push(s)});sortStreams()}
    elSel.innerHTML='';
    streams.forEach(function(s,i){elSel.add(new Option((i+1)+'. '+s.title.substring(0,50)+ql(s.title),i))});
    log(streams.length+' streams'+(hasMore?' - MAS':' - FIN'));
    if(hasMore)elMore.style.display='block';
}

document.addEventListener('keydown',function(e){
    var k=e.key,v=getVideo();
    if(v&&v.style.display==='block'){
        if(k==='Escape'){closeVideo();log('Cerrado')}
        else if(k===' '){e.preventDefault();if(v.paused)v.play().catch(function(){});else v.pause()}
        else if(k==='ArrowRight'){e.preventDefault();if(playingFav){if(playingIdx<favorites.length-1)playFav(playingIdx+1);else log('Fin favoritos')}else{var n=playingIdx+1;n<streams.length?playStream(n):log('Fin lista')}}
        else if(k==='ArrowLeft'){e.preventDefault();if(playingFav){if(playingIdx>0)playFav(playingIdx-1);else log('Inicio favoritos')}else{var p=playingIdx-1;p>=0?playStream(p):log('Inicio lista')}}
        return;
    }
    if(k==='ArrowDown'){
        e.preventDefault();
        var list=mode==='favorites'?favorites:streams,lim=list.length-1;
        if(idx<lim){idx++;elSel.value=idx;elSel.selectedIndex=idx;scrollToSel();log(list[idx].title.substring(0,40))}
        else if(mode==='search'&&hasMore){page++;loadPage(page)}
    }
    else if(k==='ArrowUp'){e.preventDefault();if(idx>0){idx--;elSel.value=idx;elSel.selectedIndex=idx;scrollToSel();log((mode==='favorites'?favorites:streams)[idx].title.substring(0,40))}}
    else if(k==='Enter'){e.preventDefault();if(mode==='favorites'){if(favorites[idx])playFav(idx)}else if(mode==='search'){if(txt.length>0&&idx>=0&&streams[idx])playStream(idx);else buscar()}}
    else if(k==='Backspace'){txt=txt.slice(0,-1);renderIn();idx=-1;resetResults()}
    else if(k.length===1){txt+=k;renderIn()}
    else if(k==='F1'){e.preventDefault();elQm.classList.toggle('show')}
    else if(k==='f'||k==='F'){if(mode==='search'&&streams[idx])addFavorite()}
    else if(k==='s'||k==='S'){showFavorites()}
    else if(k==='Home'){txt='';renderIn();setMode('search');resetResults();idx=-1}
    else if(k==='PageDown'){if(hasMore&&!loading){page++;loadPage(page)}}
    else if(k==='PageUp'){if(page>1&&!loading){page--;loadPage(page)}}
});

elMore.addEventListener('click',function(){if(hasMore&&!loading){page++;loadPage(page);this.style.display='none'}});

var bgs=['https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUydjQyOXRoYjM2a3JydGZ0Zm42azZydnI3ZnJ1ZHFrZXJ5aW9iOHFiMSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/riw3K0D2h4klG/giphy.gif','https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUyNGJwdW00b2RrcnIyenY3Ymh3ZGZ3Y3h0Y2IyeWdvdGxob3BmeW9hYSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/QuPrp3BI6cMe2lErCb/giphy.gif','https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUyMXd3enBqODk2dHVnZmY2MGFuNmJpYW5tZXAzam4zaWx5bjl1dDRnMCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/VLzbEtlbwJUFljcRbf/giphy.gif','https://media0.giphy.com/media/v1.Y2lkPTZjMDliOTUyaWFzbzRuZnI4bmFwcWN5Z2kyZXViNnNsang1cWx5NDlydDgwamp6bSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/DoiNV6NO73U5DVq1vA/giphy.gif','https://media0.giphy.com/media/v1.Y2lkPTZjMDliOTUydzB6bGVjZnhidXhhdTk3emhndjc0MzNpanBrZ3NpOHp2cDNhbTVnMyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/1oSbCb9ZhC7MvQBd3s/giphy.gif','https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyMjJ5dWI4NW95bHk1NXRyZWkwaTMwdGdkOWU3dW1qYjkwc3N4ZmlucCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/TIEh1VS5EYQt5QbODH/giphy.gif','https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyd202emhrcjM5NHN6czNjYWk2MGh3bTFyb3RnOXJjOGFnYmNvZXNycCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/J1KaQ7nz8P0L3O15L7/giphy.gif','https://media3.giphy.com/media/v1.Y2lkPTZjMDliOTUyYnhsZWEyejh2cHM3bzhubnkzNXEzbnNzbDhsMm4xZjVpZTlnZWM1OSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/muzaYMXAENjiw/giphy.gif'];
for(var i=bgs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=bgs[i];bgs[i]=bgs[j];bgs[j]=t}
var bgIdx=0,bgEl=document.getElementById('bg');
function nextBg(){if(bgIdx>=bgs.length){for(var i=bgs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=bgs[i];bgs[i]=bgs[j];bgs[j]=t}bgIdx=0}return bgs[bgIdx++]}
bgEl.style.backgroundImage='url('+nextBg()+')';
setInterval(function(){bgEl.style.backgroundImage='url('+nextBg()+')'},5000);
renderIn();
</script>
</body>
</html>
